services:
  auth_server:
    build:
      context: ./auth
      dockerfile: Dockerfile
      # Use build args for better caching
      args:
        NODE_ENV: production
    container_name: quiz_auth_server
    ports:
      - "3001:3001"
    volumes:
      # Only mount what's necessary in production
      - ./auth/service-account.json:/usr/src/app/service-account.json:ro
      # Mount logs directory for log persistence
      - auth_logs:/usr/src/app/logs
    env_file:
      - ./auth/.env.auth
    environment:
      - NODE_ENV=production
      - GOOGLE_APPLICATION_CREDENTIALS=/usr/src/app/service-account.json
    networks:
      - quiz_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=Host(`auth.korczewski.de`)"
      - "traefik.http.routers.auth.tls=true"
      - "traefik.http.routers.auth.tls.certresolver=letsencrypt"
      - "traefik.http.services.auth.loadbalancer.server.port=3001"
      # Health check configuration for Traefik
      - "traefik.http.services.auth.loadbalancer.healthcheck.path=/api/health"
      - "traefik.http.services.auth.loadbalancer.healthcheck.interval=30s"
      - "traefik.http.services.auth.loadbalancer.healthcheck.timeout=5s"
    restart: unless-stopped
    # Resource limits for production
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    # Better logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  game_server:
    build:
      context: ./game
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: quiz_game_server
    volumes:
      - ./game/service-account.json:/usr/src/app/service-account.json:ro
      - game_logs:/usr/src/app/logs
    env_file:
      - ./game/.env.game
    environment:
      - NODE_ENV=production
      - GOOGLE_APPLICATION_CREDENTIALS=/usr/src/app/service-account.json
    networks:
      - quiz_network
    depends_on:
      auth_server:
        condition: service_healthy
      traefik:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.game.rule=Host(`game.korczewski.de`)"
      - "traefik.http.routers.game.tls=true"
      - "traefik.http.routers.game.tls.certresolver=letsencrypt"
      - "traefik.http.services.game.loadbalancer.server.port=3000"
      # Health check configuration
      - "traefik.http.services.game.loadbalancer.healthcheck.path=/api/health"
      - "traefik.http.services.game.loadbalancer.healthcheck.interval=30s"
      - "traefik.http.services.game.loadbalancer.healthcheck.timeout=5s"
      # Security headers
      - "traefik.http.middlewares.game-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.game-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.game-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.game-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.game-headers.headers.customRequestHeaders.X-Forwarded-Proto=https"
      # CORS headers for WebSocket
      - "traefik.http.middlewares.game-cors.headers.accessControlAllowOriginList=https://game.korczewski.de,https://auth.korczewski.de"
      - "traefik.http.middlewares.game-cors.headers.accessControlAllowMethods=GET,POST,PUT,DELETE,OPTIONS"
      - "traefik.http.middlewares.game-cors.headers.accessControlAllowHeaders=Content-Type,Authorization,X-Requested-With"
      - "traefik.http.middlewares.game-cors.headers.accessControlAllowCredentials=true"
      - "traefik.http.routers.game.middlewares=game-headers,game-cors"

  # Reverse Proxy with SSL
  traefik:
    image: traefik:v3.0
    container_name: quiz_traefik
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=patrick@korczewski.de
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      # Enable health checks
      - --ping=true
      # Improved logging
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - quiz_network
    restart: unless-stopped
    # Health check for Traefik
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Named volumes for log persistence
volumes:
  auth_logs:
    driver: local
  game_logs:
    driver: local

networks:
  quiz_network:
    external: false
    driver: bridge