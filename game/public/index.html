<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-Time Quiz Game - Spielen Sie interaktive Quiz-Spiele mit Freunden in Echtzeit">
    <meta name="keywords" content="Quiz, Game, Realtime, Multiplayer, Trivia, German">
    <meta name="author" content="Quiz Game Team">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://game.korczewski.de/">
    <meta property="og:title" content="Real-Time Quiz Game">
    <meta property="og:description" content="Spielen Sie interaktive Quiz-Spiele mit Freunden in Echtzeit">
    <meta property="og:image" content="/favicon-192x192.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://game.korczewski.de/">
    <meta property="twitter:title" content="Real-Time Quiz Game">
    <meta property="twitter:description" content="Spielen Sie interaktive Quiz-Spiele mit Freunden in Echtzeit">
    <meta property="twitter:image" content="/favicon-192x192.png">

    <title>Real-Time Quiz Game - Spielen Sie mit Freunden!</title>

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#0f172a">

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Game",
        "name": "Real-Time Quiz Game",
        "description": "Interaktives Multiplayer-Quiz-Spiel in Echtzeit",
        "url": "https://game.korczewski.de/",
        "genre": "Quiz Game",
        "numberOfPlayers": "1-10",
        "playMode": "MultiPlayer",
        "applicationCategory": "Game"
    }
    </script>

    <!-- Performance hints -->
    <link rel="dns-prefetch" href="//www.gstatic.com">
    <link rel="dns-prefetch" href="//cdn.tailwindcss.com">

    <!-- Service Worker registration -->
    <script>
        // Register service worker for offline functionality
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('SW registered: ', registration);
                    })
                    .catch(registrationError => {
                        console.log('SW registration failed: ', registrationError);
                    });
            });
        }
    </script>

    <style>
        /* Critical CSS for faster loading */
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        /* Initial loading state */
        .initial-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: white;
            opacity: 1;
            transition: opacity 0.5s ease-out;
        }

        .initial-loading.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(59, 130, 246, 0.3);
            border-radius: 50%;
            border-top-color: #3b82f6;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 18px;
            font-weight: 500;
        }

        .loading-features {
            margin-top: 20px;
            text-align: center;
            max-width: 400px;
        }

        .loading-features p {
            margin: 8px 0;
            font-size: 14px;
            color: #94a3b8;
        }

        /* Game info display */
        .game-info {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-title {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .game-subtitle {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #3b82f6;
        }

        /* Hide body content initially until app loads */
        body:not(.app-loaded) #app-container {
            display: none;
        }

        body.app-loaded .initial-loading {
            display: none;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .game-title {
                font-size: 2rem;
            }
            .game-subtitle {
                font-size: 1.2rem;
            }
            .loading-features {
                max-width: 300px;
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Initial Loading Screen (will be hidden when app loads) -->
    <div class="initial-loading" id="initialLoading">
        <div class="game-info">
            <div class="game-title">🎮</div>
            <h1 class="game-subtitle">Quiz Game</h1>
        </div>
        
        <div class="loading-spinner"></div>
        <div class="loading-text">Spiel wird initialisiert...</div>
        
        <div class="loading-features">
            <p>🧠 10 Fragen pro Spiel</p>
            <p>⏱️ 60 Sekunden pro Frage</p>
            <p>⚡ Multiplier-Punktesystem</p>
            <p>👥 Bis zu 10 Spieler gleichzeitig</p>
            <p>🏆 Hall of Fame Integration</p>
        </div>
    </div>

    <!-- Main App Container (will be populated by main.js) -->
    <div id="app-container"></div>

    <!-- Audio preloading -->
    <div style="display: none;" aria-hidden="true">
        <audio preload="none" id="preload-click" src="assets/sounds/click.mp3"></audio>
        <audio preload="none" id="preload-correct" src="assets/sounds/correctanswer.mp3"></audio>
        <audio preload="none" id="preload-incorrect" src="assets/sounds/incorrectanswer.mp3"></audio>
    </div>

    <script>
        // Global error handler
        window.addEventListener('error', (event) => {
            console.error('Global error:', event.error);
            // Show user-friendly error message
            const loadingText = document.querySelector('.loading-text');
            if (loadingText) {
                loadingText.textContent = 'Fehler beim Laden. Bitte Seite neu laden.';
                loadingText.style.color = '#ef4444';
            }
        });

        // Configuration injection point (will be replaced by server)
        // window.CONFIG will be injected here by the server

        // Hide initial loading screen when app is ready
        window.hideInitialLoading = function() {
            document.body.classList.add('app-loaded');
            const initialLoading = document.getElementById('initialLoading');
            if (initialLoading) {
                initialLoading.classList.add('fade-out');
                setTimeout(() => {
                    initialLoading.style.display = 'none';
                }, 500);
            }
        };

        // Fallback: hide loading screen after maximum wait time
        setTimeout(() => {
            if (!document.body.classList.contains('app-loaded')) {
                console.warn('App loading timeout - hiding loading screen');
                window.hideInitialLoading();
            }
        }, 10000); // 10 second timeout
    </script>

    <!-- Main Application Script (contains Firebase SDK loading and all game logic) -->
    <script src="main.js"></script>

    <!-- Analytics (optional) -->
    <script>
        // Basic analytics tracking
        if (typeof gtag !== 'undefined') {
            gtag('config', 'GA_MEASUREMENT_ID', {
                page_title: 'Quiz Game',
                page_location: window.location.href
            });
        }
    </script>

    <!-- Global keyboard shortcuts and accessibility -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                // Ctrl+/ or Cmd+/ for help
                if ((e.ctrlKey || e.metaKey) && e.key === '/') {
                    e.preventDefault();
                    console.log('Keyboard shortcuts:\n- Space: Pause/Resume (Host only)\n- Ctrl+/: Show this help\n- Escape: Close notifications');
                }
            });

            // Accessibility improvements
            document.addEventListener('keydown', (e) => {
                // Escape key to close modals/notifications
                if (e.key === 'Escape') {
                    const notification = document.getElementById('global-notification');
                    if (notification && !notification.classList.contains('hidden')) {
                        notification.classList.add('hidden');
                    }
                }
            });

            // Device orientation handling for mobile
            window.addEventListener('orientationchange', () => {
                setTimeout(() => {
                    window.scrollTo(0, 0);
                }, 100);
            });

            // Prevent zoom on double tap (iOS Safari)
            let lastTouchEnd = 0;
            document.addEventListener('touchend', (event) => {
                const now = (new Date()).getTime();
                if (now - lastTouchEnd <= 300) {
                    event.preventDefault();
                }
                lastTouchEnd = now;
            }, false);
        });

        // Performance monitoring
        window.addEventListener('load', () => {
            if (window.performance) {
                const loadTime = window.performance.timing.loadEventEnd - window.performance.timing.navigationStart;
                console.log('Page load time:', loadTime + 'ms');
            }
        });
    </script>

    <!-- Error fallback -->
    <noscript>
        <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; text-align: center; font-family: Arial, sans-serif; z-index: 10000;">
            <div>
                <div style="font-size: 4rem; margin-bottom: 1rem;">🎮</div>
                <h1 style="font-size: 2rem; margin-bottom: 1rem;">Quiz Game</h1>
                <p style="font-size: 1.1rem; margin-bottom: 0.5rem;">JavaScript ist erforderlich, um dieses Spiel zu spielen.</p>
                <p style="color: #94a3b8;">Bitte aktivieren Sie JavaScript in Ihrem Browser.</p>
            </div>
        </div>
    </noscript>
</body>
</html>
