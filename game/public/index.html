<script>
    // Global error handler
    window.addEventListener('error', (event) => {
        console.error('Global error:', event.error, 'at', event.filename, event.lineno, ':', event.colno);
        const loadingText = document.querySelector('.loading-text');
        if (loadingText && loadingText.closest('#initialLoading')) { // Only if initial loading is visible
            loadingText.textContent = 'Fehler beim Laden. Bitte Seite neu laden.';
            loadingText.style.color = '#ef4444'; // Red color
        }
    });

    // Hide initial loading screen when app is ready
    window.hideInitialLoading = function() {
        document.body.classList.add('app-loaded');
        const initialLoadingEl = document.getElementById('initialLoading');
        if (initialLoadingEl) {
            initialLoadingEl.classList.add('fade-out');
            setTimeout(() => {
                initialLoadingEl.style.display = 'none';
            }, 500); // Match CSS transition
        }
    };

    // Fallback: hide loading screen after maximum wait time
    const loadingTimeout = setTimeout(() => {
        if (!document.body.classList.contains('app-loaded')) {
            console.warn('App loading timeout - forcefully hiding loading screen');
            window.hideInitialLoading();
        }
    }, 10000); // 10 second timeout

    // Clear timeout if app loads faster
    window.addEventListener('appready', () => { // Custom event to be fired by main.js
        clearTimeout(loadingTimeout);
        window.hideInitialLoading();
    });
</script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === '/') {
                e.preventDefault();
                // Consider a more user-friendly way to show help, e.g., a modal
                console.log('Keyboard shortcuts:\n- Space: Pause/Resume (Host only, in game)\n- Ctrl+/: Show this help\n- Escape: Close notifications/modals');
            }
        });

        // Accessibility improvements for Esc key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const notification = document.getElementById('global-notification');
                if (notification && !notification.classList.contains('hidden')) {
                    notification.classList.add('hidden');
                }
                // Add similar logic for any modals if they are implemented
            }
        });

        // Device orientation handling for mobile (optional, can cause reflows)
        // window.addEventListener('orientationchange', () => {
        //     setTimeout(() => { window.scrollTo(0, 0); }, 100);
        // });

        // Prevent zoom on double tap (iOS Safari) - often good for web apps
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (event) => {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    });

    // Performance monitoring
    window.addEventListener('load', () => {
        if (window.performance && window.performance.timing) {
            const loadTime = window.performance.timing.loadEventEnd - window.performance.timing.navigationStart;
            console.log('Page load time:', loadTime + 'ms');
        }
        // Fire appready event after main.js has likely run its course (or main.js can fire it)
        if (!document.body.classList.contains('app-loaded')) {
            window.dispatchEvent(new CustomEvent('appready'));
        }
    });
</script>
