<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kommilitonen Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <!-- WICHTIG: Dieser Platzhalter wird vom Server ersetzt -->
    <!-- CONFIG_INJECTION_POINT -->

    <style>
        /* Ihre CSS-Styles hier */
        .loading { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .hidden { display: none; }
        /* Weitere Styles... */
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
<!-- Loading Screen -->
<div id="loading-screen" class="loading">
    <div class="text-center">
        <div class="animate-spin rounded-full h-32 w-32 border-b-2 border-blue-500 mx-auto"></div>
        <p class="mt-4 text-xl">Lade Quiz-Spiel...</p>
    </div>
</div>

<!-- Main Game Interface (initially hidden) -->
<div id="game-container" class="hidden">
    <!-- Ihr Game-Interface hier -->
    <div id="auth-section" class="container mx-auto p-4">
        <h1 class="text-4xl font-bold text-center mb-8">🎮 Kommilitonen Quiz</h1>

        <!-- Auth/Guest Login -->
        <div class="max-w-md mx-auto bg-gray-800 rounded-lg p-6">
            <div id="auth-options" class="space-y-4">
                <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                    Mit Account anmelden
                </button>
                <button id="guest-btn" class="w-full bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded">
                    Als Gast spielen
                </button>
            </div>

            <!-- Guest Name Input -->
            <div id="guest-form" class="hidden space-y-4">
                <input type="text" id="guest-name" placeholder="Dein Name"
                       class="w-full px-3 py-2 bg-gray-700 text-white rounded-md">
                <button id="guest-continue" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded">
                    Weiter
                </button>
            </div>
        </div>
    </div>

    <!-- Lobby Section -->
    <div id="lobby-section" class="hidden container mx-auto p-4">
        <!-- Lobby Interface -->
    </div>

    <!-- Game Section -->
    <div id="game-section" class="hidden container mx-auto p-4">
        <!-- Game Interface -->
    </div>
</div>

<!-- Debug Information -->
<div id="debug-info" class="fixed bottom-4 right-4 bg-gray-800 p-2 rounded text-xs">
    <div>Status: <span id="connection-status">Connecting...</span></div>
    <div>Config: <span id="config-status">Loading...</span></div>
</div>

<!-- Main JavaScript -->
<script src="/main.js"></script>
</body>
</html>
